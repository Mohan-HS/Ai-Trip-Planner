name: Semgrep SAST

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 🐍 Setup Python (needed for Semgrep)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 🔐 Install Semgrep
      - name: Install Semgrep
        run: pip install semgrep

      # 🔐 Run Semgrep (SAST)
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/security-audit \
            --error \
            --severity ERROR

      # 📊 Upload report (optional but useful)
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: .
